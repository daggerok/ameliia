<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ameliia's Fraction Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./style.scss">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #666;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 15px;
            font-weight: 600;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 1.5rem;
        }

        .level-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .level-btn {
            padding: 1.5rem;
            border: none;
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
            font-weight: 600;
        }

        .level-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .level-btn.active {
            ring: 4px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .level-1 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .level-2 { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
        .level-3 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .level-4 { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); }

        .question-area {
            text-align: center;
            margin: 2rem 0;
        }

        .question-text {
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-weight: 600;
            color: #333;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .fraction-display {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 0 0.5rem;
            vertical-align: middle;
        }

        .fraction-display .numerator,
        .fraction-display .denominator {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            color: #667eea;
        }

        .fraction-display .fraction-line {
            width: 100%;
            height: 3px;
            background: #667eea;
            margin: 0.2rem 0;
        }

        .visual-aid {
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f8f9ff;
            border-radius: 15px;
        }

        .circles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .circle {
            width: clamp(60px, 15vw, 100px);
            height: clamp(60px, 15vw, 100px);
            border-radius: 50%;
            border: 3px solid #667eea;
            position: relative;
            overflow: hidden;
            background: white;
        }

        .circle-fill {
            position: absolute;
            background: #667eea;
            opacity: 0.6;
        }

        .answer-input {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            padding: 1rem;
            border: 3px solid #667eea;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 300px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin: 1rem auto;
            display: block;
        }

        .answer-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(118, 75, 162, 0.3);
        }

        .fraction-input-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .fraction-input {
            width: clamp(80px, 20vw, 120px);
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            padding: 0.75rem;
            border: 3px solid #667eea;
            border-radius: 15px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .fraction-separator {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            color: #667eea;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 15px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Fredoka', sans-serif;
            margin: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 15px;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            line-height: 1.6;
        }

        .feedback.correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #0a5f38;
        }

        .feedback.incorrect {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #8b3a00;
        }

        .explanation {
            background: #fff9e6;
            padding: 1.5rem;
            border-radius: 15px;
            margin-top: 1rem;
            border-left: 5px solid #ffd700;
        }

        .explanation h3 {
            color: #667eea;
            margin-bottom: 1rem;
            font-family: 'Fredoka', sans-serif;
        }

        .explanation p {
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }

        .explanation strong {
            color: #764ba2;
        }

        .button-group {
            text-align: center;
            margin-top: 1.5rem;
        }

        @media (max-width: 480px) {
            .game-card {
                padding: 1.5rem;
            }

            .btn {
                padding: 0.8rem 1.5rem;
                width: 100%;
                margin: 0.3rem 0;
            }
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }

        .hidden {
            display: none;
        }

        .emoji {
            font-size: clamp(2rem, 6vw, 3rem);
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌟 Ameliia's Fraction Adventure 🌟</h1>
        <p>Master fractions while having fun!</p>
        <div class="stats">
            <div class="stat-box">⭐ Score: <span id="score">0</span></div>
            <div class="stat-box">🔥 Streak: <span id="streak">0</span></div>
            <div class="stat-box">✅ Correct: <span id="correct">0</span></div>
        </div>
    </div>

    <div id="levelSelection" class="game-card">
        <h2 style="text-align: center; margin-bottom: 1.5rem; font-family: 'Fredoka', sans-serif;">Choose Your Challenge Level</h2>
        <div class="level-selector">
            <button class="level-btn level-1" onclick="selectLevel(1)">
                🌱 Beginner<br>
                <small>Visual fractions</small>
            </button>
            <button class="level-btn level-2" onclick="selectLevel(2)">
                🌿 Explorer<br>
                <small>Comparing fractions</small>
            </button>
            <button class="level-btn level-3" onclick="selectLevel(3)">
                🌳 Champion<br>
                <small>Adding fractions</small>
            </button>
            <button class="level-btn level-4" onclick="selectLevel(4)">
                🏆 Master<br>
                <small>Equivalent fractions</small>
            </button>
        </div>
    </div>

    <div id="gameArea" class="game-card hidden">
        <div id="questionArea" class="question-area"></div>
        <div id="visualAid" class="visual-aid hidden"></div>
        <div id="answerArea"></div>
        <div id="feedback" class="feedback hidden"></div>
        <div class="button-group">
            <button class="btn btn-secondary" onclick="showLevelSelection()">Change Level</button>
        </div>
    </div>
</div>

<script>
    // Game State
    let currentLevel = 1;
    let score = 0;
    let streak = 0;
    let correctAnswers = 0;
    let currentQuestion = null;

    // Utility Functions
    function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
    }

    function simplifyFraction(num, den) {
        const divisor = gcd(num, den);
        return [num / divisor, den / divisor];
    }

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Level Selection
    function selectLevel(level) {
        currentLevel = level;
        document.getElementById('levelSelection').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        generateQuestion();
    }

    function showLevelSelection() {
        document.getElementById('levelSelection').classList.remove('hidden');
        document.getElementById('gameArea').classList.add('hidden');
    }

    // Question Generators
    function generateLevel1() {
        // Visual fraction identification
        const denominator = [2, 3, 4, 6, 8][randomInt(0, 4)];
        const numerator = randomInt(1, denominator - 1);

        currentQuestion = {
            type: 'visual',
            numerator: numerator,
            denominator: denominator,
            answer: `${numerator}/${denominator}`
        };

        let html = '<p class="question-text">What fraction is shaded?</p>';
        html += '<div class="visual-aid">';
        html += '<div class="circles-container">';

        for (let i = 0; i < denominator; i++) {
            html += '<div class="circle">';
            if (i < numerator) {
                html += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';
            }
            html += '</div>';
        }

        html += '</div></div>';

        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('visualAid').classList.add('hidden');

        document.getElementById('answerArea').innerHTML = `
                <div class="fraction-input-container">
                    <input type="number" id="numeratorInput" class="fraction-input" placeholder="?" min="0">
                    <span class="fraction-separator">/</span>
                    <input type="number" id="denominatorInput" class="fraction-input" placeholder="?" min="1">
                </div>
                <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
            `;
    }

    function generateLevel2() {
        // Comparing fractions
        const den1 = [2, 3, 4, 6, 8][randomInt(0, 4)];
        const num1 = randomInt(1, den1 - 1);
        const den2 = [2, 3, 4, 6, 8][randomInt(0, 4)];
        const num2 = randomInt(1, den2 - 1);

        const val1 = num1 / den1;
        const val2 = num2 / den2;
        let correctAnswer;

        if (val1 > val2) correctAnswer = '>';
        else if (val1 < val2) correctAnswer = '<';
        else correctAnswer = '=';

        currentQuestion = {
            type: 'compare',
            num1, den1, num2, den2,
            answer: correctAnswer
        };

        let html = '<p class="question-text">Which fraction is greater?</p>';
        html += '<div style="display: flex; justify-content: center; align-items: center; gap: 2rem; flex-wrap: wrap; margin: 2rem 0;">';
        html += `<div class="fraction-display">
                <span class="numerator">${num1}</span>
                <div class="fraction-line"></div>
                <span class="denominator">${den1}</span>
            </div>`;
        html += '<span style="font-size: 2rem; font-weight: 700;">?</span>';
        html += `<div class="fraction-display">
                <span class="numerator">${num2}</span>
                <div class="fraction-line"></div>
                <span class="denominator">${den2}</span>
            </div>`;
        html += '</div>';

        document.getElementById('questionArea').innerHTML = html;

        // Create visual aid
        let visualHtml = '<h3 style="text-align: center; margin-bottom: 1rem;">Visual Comparison</h3>';
        visualHtml += '<div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem;">';

        visualHtml += '<div style="text-align: center;">';
        visualHtml += `<p style="margin-bottom: 0.5rem; font-weight: 600;">${num1}/${den1}</p>`;
        visualHtml += '<div class="circles-container" style="justify-content: center;">';
        for (let i = 0; i < den1; i++) {
            visualHtml += '<div class="circle">';
            if (i < num1) {
                visualHtml += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';
            }
            visualHtml += '</div>';
        }
        visualHtml += '</div></div>';

        visualHtml += '<div style="text-align: center;">';
        visualHtml += `<p style="margin-bottom: 0.5rem; font-weight: 600;">${num2}/${den2}</p>`;
        visualHtml += '<div class="circles-container" style="justify-content: center;">';
        for (let i = 0; i < den2; i++) {
            visualHtml += '<div class="circle">';
            if (i < num2) {
                visualHtml += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';
            }
            visualHtml += '</div>';
        }
        visualHtml += '</div></div>';

        visualHtml += '</div>';

        document.getElementById('visualAid').innerHTML = visualHtml;
        document.getElementById('visualAid').classList.remove('hidden');

        document.getElementById('answerArea').innerHTML = `
                <p style="text-align: center; margin: 1.5rem 0; font-size: 1.2rem; font-weight: 600;">
                    Type the correct symbol: < (less than), > (greater than), or = (equal)
                </p>
                <input type="text" id="symbolInput" class="answer-input" placeholder="<, >, or =" maxlength="1">
                <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
            `;
    }

    function generateLevel3() {
        // Adding fractions with same denominator
        const denominator = [2, 3, 4, 5, 6, 8][randomInt(0, 5)];
        const num1 = randomInt(1, denominator - 2);
        const num2 = randomInt(1, denominator - num1);

        const sumNum = num1 + num2;
        const [simplifiedNum, simplifiedDen] = simplifyFraction(sumNum, denominator);

        currentQuestion = {
            type: 'add',
            num1, num2, denominator,
            answerNum: simplifiedNum,
            answerDen: simplifiedDen,
            beforeSimplify: [sumNum, denominator]
        };

        let html = '<p class="question-text">Add these fractions and simplify your answer:</p>';
        html += '<div style="display: flex; justify-content: center; align-items: center; gap: 1.5rem; flex-wrap: wrap; margin: 2rem 0;">';
        html += `<div class="fraction-display">
                <span class="numerator">${num1}</span>
                <div class="fraction-line"></div>
                <span class="denominator">${denominator}</span>
            </div>`;
        html += '<span style="font-size: 2.5rem; font-weight: 700; color: #667eea;">+</span>';
        html += `<div class="fraction-display">
                <span class="numerator">${num2}</span>
                <div class="fraction-line"></div>
                <span class="denominator">${denominator}</span>
            </div>`;
        html += '<span style="font-size: 2.5rem; font-weight: 700; color: #667eea;">=</span>';
        html += '<span style="font-size: 2.5rem; font-weight: 700; color: #667eea;">?</span>';
        html += '</div>';

        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('visualAid').classList.add('hidden');

        document.getElementById('answerArea').innerHTML = `
                <p style="text-align: center; margin: 1rem 0; font-weight: 600;">Enter your answer in simplest form:</p>
                <div class="fraction-input-container">
                    <input type="number" id="numeratorInput" class="fraction-input" placeholder="?" min="0">
                    <span class="fraction-separator">/</span>
                    <input type="number" id="denominatorInput" class="fraction-input" placeholder="?" min="1">
                </div>
                <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
            `;
    }

    function generateLevel4() {
        // Equivalent fractions
        const originalDen = [2, 3, 4, 5, 6][randomInt(0, 4)];
        const originalNum = randomInt(1, originalDen - 1);
        const multiplier = randomInt(2, 4);

        const targetDen = originalDen * multiplier;
        const targetNum = originalNum * multiplier;

        currentQuestion = {
            type: 'equivalent',
            originalNum, originalDen,
            targetNum, targetDen,
            answer: targetNum
        };

        let html = '<p class="question-text">Find the equivalent fraction:</p>';
        html += '<div style="display: flex; justify-content: center; align-items: center; gap: 1.5rem; flex-wrap: wrap; margin: 2rem 0;">';
        html += `<div class="fraction-display">
                <span class="numerator">${originalNum}</span>
                <div class="fraction-line"></div>
                <span class="denominator">${originalDen}</span>
            </div>`;
        html += '<span style="font-size: 2.5rem; font-weight: 700; color: #667eea;">=</span>';
        html += `<div class="fraction-display">
                <span class="numerator" style="color: #f5576c;">?</span>
                <div class="fraction-line" style="background: #f5576c;"></div>
                <span class="denominator">${targetDen}</span>
            </div>`;
        html += '</div>';

        document.getElementById('questionArea').innerHTML = html;

        // Visual aid
        let visualHtml = '<h3 style="text-align: center; margin-bottom: 1rem;">Visual Representation</h3>';
        visualHtml += '<div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem;">';

        visualHtml += '<div style="text-align: center;">';
        visualHtml += `<p style="margin-bottom: 0.5rem; font-weight: 600;">Original: ${originalNum}/${originalDen}</p>`;
        visualHtml += '<div class="circles-container" style="justify-content: center;">';
        for (let i = 0; i < originalDen; i++) {
            visualHtml += '<div class="circle" style="width: 80px; height: 80px;">';
            if (i < originalNum) {
                visualHtml += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';
            }
            visualHtml += '</div>';
        }
        visualHtml += '</div></div>';

        visualHtml += '<div style="text-align: center;">';
        visualHtml += `<p style="margin-bottom: 0.5rem; font-weight: 600;">Equivalent: ?/${targetDen}</p>`;
        visualHtml += '<div class="circles-container" style="justify-content: center;">';
        for (let i = 0; i < targetDen; i++) {
            visualHtml += '<div class="circle" style="width: 60px; height: 60px;">';
            if (i < targetNum) {
                visualHtml += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';
            }
            visualHtml += '</div>';
        }
        visualHtml += '</div></div>';

        visualHtml += '</div>';
        visualHtml += `<p style="text-align: center; margin-top: 1rem; font-style: italic;">Hint: The denominators are different, but they represent the same amount!</p>`;

        document.getElementById('visualAid').innerHTML = visualHtml;
        document.getElementById('visualAid').classList.remove('hidden');

        document.getElementById('answerArea').innerHTML = `
                <p style="text-align: center; margin: 1rem 0; font-weight: 600;">What number goes in the numerator?</p>
                <input type="number" id="numeratorInput" class="answer-input" placeholder="?" min="0">
                <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
            `;
    }

    function generateQuestion() {
        document.getElementById('feedback').classList.add('hidden');

        switch(currentLevel) {
            case 1: generateLevel1(); break;
            case 2: generateLevel2(); break;
            case 3: generateLevel3(); break;
            case 4: generateLevel4(); break;
        }

        // Add enter key support
        setTimeout(() => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAnswer();
                });
                input.focus();
            });
        }, 100);
    }

    function checkAnswer() {
        let userAnswer;
        let correct = false;
        let explanation = '';

        switch(currentQuestion.type) {
            case 'visual':
                const userNum = parseInt(document.getElementById('numeratorInput').value);
                const userDen = parseInt(document.getElementById('denominatorInput').value);
                correct = userNum === currentQuestion.numerator && userDen === currentQuestion.denominator;

                if (correct) {
                    explanation = `
                            <div class="explanation">
                                <h3>Perfect! 🎉</h3>
                                <p><strong>${currentQuestion.numerator} out of ${currentQuestion.denominator}</strong> circles are shaded.</p>
                                <p>The <strong>numerator</strong> (top number) shows how many parts are shaded: <strong>${currentQuestion.numerator}</strong></p>
                                <p>The <strong>denominator</strong> (bottom number) shows the total number of equal parts: <strong>${currentQuestion.denominator}</strong></p>
                                <p>So the fraction is <strong>${currentQuestion.numerator}/${currentQuestion.denominator}</strong></p>
                            </div>
                        `;
                } else {
                    explanation = `
                            <div class="explanation">
                                <h3>Let's learn together! 📚</h3>
                                <p>You wrote: <strong>${userNum}/${userDen}</strong>, but the correct answer is <strong>${currentQuestion.numerator}/${currentQuestion.denominator}</strong></p>
                                <p><strong>Count the shaded circles:</strong> There are ${currentQuestion.numerator} shaded circles. This is the <strong>numerator</strong> (top number).</p>
                                <p><strong>Count all the circles:</strong> There are ${currentQuestion.denominator} circles in total. This is the <strong>denominator</strong> (bottom number).</p>
                                <p><strong>Remember:</strong> A fraction shows "part of a whole". The numerator tells us the part we have, and the denominator tells us how many equal parts make the whole.</p>
                            </div>
                        `;
                }
                break;

            case 'compare':
                userAnswer = document.getElementById('symbolInput').value.trim();
                correct = userAnswer === currentQuestion.answer;

                const val1 = currentQuestion.num1 / currentQuestion.den1;
                const val2 = currentQuestion.num2 / currentQuestion.den2;

                if (correct) {
                    explanation = `
                            <div class="explanation">
                                <h3>Excellent work! 🌟</h3>
                                <p><strong>${currentQuestion.num1}/${currentQuestion.den1} ${currentQuestion.answer} ${currentQuestion.num2}/${currentQuestion.den2}</strong></p>
                                <p>When we compare fractions, we're looking at which represents a larger part of a whole.</p>
                                <p><strong>${currentQuestion.num1}/${currentQuestion.den1}</strong> = ${val1.toFixed(3)} and <strong>${currentQuestion.num2}/${currentQuestion.den2}</strong> = ${val2.toFixed(3)}</p>
                                <p>You can see from the visual circles which one has more shaded!</p>
                            </div>
                        `;
                } else {
                    explanation = `
                            <div class="explanation">
                                <h3>Let's figure this out! 🔍</h3>
                                <p>You wrote: <strong>${userAnswer}</strong>, but the correct answer is <strong>${currentQuestion.answer}</strong></p>
                                <p><strong>Tip:</strong> Look at the shaded circles above. Which fraction has more circles shaded?</p>
                                <p><strong>${currentQuestion.num1}/${currentQuestion.den1}</strong> means ${currentQuestion.num1} out of ${currentQuestion.den1} parts</p>
                                <p><strong>${currentQuestion.num2}/${currentQuestion.den2}</strong> means ${currentQuestion.num2} out of ${currentQuestion.den2} parts</p>
                                <p>As decimals: ${currentQuestion.num1}/${currentQuestion.den1} = ${val1.toFixed(3)} and ${currentQuestion.num2}/${currentQuestion.den2} = ${val2.toFixed(3)}</p>
                                <p>So ${currentQuestion.num1}/${currentQuestion.den1} ${currentQuestion.answer} ${currentQuestion.num2}/${currentQuestion.den2}</p>
                            </div>
                        `;
                }
                break;

            case 'add':
                const addUserNum = parseInt(document.getElementById('numeratorInput').value);
                const addUserDen = parseInt(document.getElementById('denominatorInput').value);
                correct = addUserNum === currentQuestion.answerNum && addUserDen === currentQuestion.answerDen;

                if (correct) {
                    explanation = `
                            <div class="explanation">
                                <h3>Outstanding! 🎯</h3>
                                <p><strong>Step 1:</strong> Add the numerators: ${currentQuestion.num1} + ${currentQuestion.num2} = ${currentQuestion.beforeSimplify[0]}</p>
                                <p><strong>Step 2:</strong> Keep the same denominator: ${currentQuestion.denominator}</p>
                                <p><strong>Step 3:</strong> We get ${currentQuestion.beforeSimplify[0]}/${currentQuestion.beforeSimplify[1]}</p>
                                ${currentQuestion.beforeSimplify[0] !== currentQuestion.answerNum ?
                        `<p><strong>Step 4:</strong> Simplify by dividing both numbers by ${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum}: ${currentQuestion.beforeSimplify[0]}÷${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum} = ${currentQuestion.answerNum} and ${currentQuestion.beforeSimplify[1]}÷${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum} = ${currentQuestion.answerDen}</p>`
                        : '<p><strong>Step 4:</strong> The fraction is already in simplest form!</p>'
                    }
                                <p><strong>Final answer: ${currentQuestion.answerNum}/${currentQuestion.answerDen}</strong></p>
                            </div>
                        `;
                } else {
                    explanation = `
                            <div class="explanation">
                                <h3>Let's work through this! 📝</h3>
                                <p>You wrote: <strong>${addUserNum}/${addUserDen}</strong>, but the correct answer is <strong>${currentQuestion.answerNum}/${currentQuestion.answerDen}</strong></p>
                                <p><strong>When adding fractions with the same denominator:</strong></p>
                                <p><strong>Step 1:</strong> Add only the numerators (top numbers): ${currentQuestion.num1} + ${currentQuestion.num2} = ${currentQuestion.beforeSimplify[0]}</p>
                                <p><strong>Step 2:</strong> Keep the denominator the same: ${currentQuestion.denominator}</p>
                                <p><strong>Step 3:</strong> This gives us ${currentQuestion.beforeSimplify[0]}/${currentQuestion.beforeSimplify[1]}</p>
                                ${currentQuestion.beforeSimplify[0] !== currentQuestion.answerNum ?
                        `<p><strong>Step 4:</strong> Simplify! Both ${currentQuestion.beforeSimplify[0]} and ${currentQuestion.beforeSimplify[1]} can be divided by ${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum}</p>
                                    <p>${currentQuestion.beforeSimplify[0]} ÷ ${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum} = ${currentQuestion.answerNum}</p>
                                    <p>${currentQuestion.beforeSimplify[1]} ÷ ${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum} = ${currentQuestion.answerDen}</p>`
                        : ''
                    }
                                <p><strong>Remember:</strong> Always simplify your answer to the smallest numbers possible!</p>
                            </div>
                        `;
                }
                break;

            case 'equivalent':
                const equivUserNum = parseInt(document.getElementById('numeratorInput').value);
                correct = equivUserNum === currentQuestion.targetNum;

                if (correct) {
                    const mult = currentQuestion.targetDen / currentQuestion.originalDen;
                    explanation = `
                            <div class="explanation">
                                <h3>Brilliant! 🏆</h3>
                                <p><strong>Equivalent fractions</strong> represent the same amount, even though they look different!</p>
                                <p><strong>Step 1:</strong> Find what we multiplied the denominator by: ${currentQuestion.originalDen} × ${mult} = ${currentQuestion.targetDen}</p>
                                <p><strong>Step 2:</strong> Multiply the numerator by the same number: ${currentQuestion.originalNum} × ${mult} = ${currentQuestion.targetNum}</p>
                                <p><strong>Result:</strong> ${currentQuestion.originalNum}/${currentQuestion.originalDen} = ${currentQuestion.targetNum}/${currentQuestion.targetDen}</p>
                                <p>Both fractions represent the exact same amount! Look at the circles above - the same portion is shaded in both!</p>
                            </div>
                        `;
                } else {
                    const mult = currentQuestion.targetDen / currentQuestion.originalDen;
                    explanation = `
                            <div class="explanation">
                                <h3>Let's discover the pattern! 🔢</h3>
                                <p>You wrote: <strong>${equivUserNum}</strong>, but the correct answer is <strong>${currentQuestion.targetNum}</strong></p>
                                <p><strong>To find equivalent fractions:</strong></p>
                                <p><strong>Step 1:</strong> Look at the denominators. ${currentQuestion.originalDen} was multiplied by ${mult} to get ${currentQuestion.targetDen}</p>
                                <p>We can check: ${currentQuestion.originalDen} × ${mult} = ${currentQuestion.targetDen} ✓</p>
                                <p><strong>Step 2:</strong> We must multiply the numerator by the SAME number to keep the fractions equivalent!</p>
                                <p>${currentQuestion.originalNum} × ${mult} = ${currentQuestion.targetNum}</p>
                                <p><strong>Important rule:</strong> Whatever you do to the bottom, you must do to the top!</p>
                                <p><strong>${currentQuestion.originalNum}/${currentQuestion.originalDen} = ${currentQuestion.targetNum}/${currentQuestion.targetDen}</strong> - They're equivalent!</p>
                            </div>
                        `;
                }
                break;
        }

        // Display feedback
        const feedbackDiv = document.getElementById('feedback');
        feedbackDiv.classList.remove('hidden', 'correct', 'incorrect');

        if (correct) {
            feedbackDiv.classList.add('correct');
            const emojis = ['🎉', '🌟', '⭐', '🏆', '💯', '✨', '🎊'];
            const emoji = emojis[randomInt(0, emojis.length - 1)];
            feedbackDiv.innerHTML = `
                    <div class="emoji">${emoji}</div>
                    <h2>Correct, Ameliia!</h2>
                    ${explanation}
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="generateQuestion()">Next Question →</button>
                    </div>
                `;

            score += 10 * currentLevel;
            streak++;
            correctAnswers++;
            updateStats();
        } else {
            feedbackDiv.classList.add('incorrect');
            feedbackDiv.innerHTML = `
                    <div class="emoji">🤔</div>
                    <h2>Not quite, but that's okay!</h2>
                    ${explanation}
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="hideExplanation()">Try Again</button>
                        <button class="btn btn-secondary" onclick="generateQuestion()">Skip to Next</button>
                    </div>
                `;

            streak = 0;
            updateStats();
        }
    }

    function hideExplanation() {
        document.getElementById('feedback').classList.add('hidden');
        // Clear inputs and refocus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.value = '';
        });
        inputs[0]?.focus();
    }

    function updateStats() {
        document.getElementById('score').textContent = score;
        document.getElementById('streak').textContent = streak;
        document.getElementById('correct').textContent = correctAnswers;
    }

    // Initialize
    updateStats();
</script>
</body>
</html>
