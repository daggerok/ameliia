<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Master - Ameliia's Learning Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./style.scss">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2rem;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-family: 'Fredoka', sans-serif;
            color: #667eea;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 0.5rem;
        }

        .header .student-name {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #764ba2;
            font-weight: 600;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px;
            color: white;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
        }

        .stat-label {
            font-size: clamp(0.8rem, 2vw, 1rem);
            opacity: 0.9;
        }

        .question-container {
            background: #f8f9ff;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            min-height: 300px;
        }

        .question-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .question-text {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: #2d3748;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .visual-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .fraction-visual {
            display: inline-block;
        }

        .circle-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .answer-section {
            margin-top: 2rem;
        }

        .answer-input {
            width: 100%;
            max-width: 200px;
            padding: 1rem;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            border: 3px solid #667eea;
            border-radius: 12px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
            transform: scale(1.05);
        }

        .fraction-input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .fraction-input-group input {
            max-width: 100px;
        }

        .fraction-line {
            width: 60px;
            height: 3px;
            background: #2d3748;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .button:active {
            transform: translateY(0);
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .explanation {
            margin-top: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
        }

        .explanation-title {
            font-weight: 700;
            color: #764ba2;
            margin-bottom: 0.5rem;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
        }

        .next-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            width: 100%;
            margin-top: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .celebration {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3rem);
            margin: 1rem 0;
            animation: bounce 0.6s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.5rem;
            }

            .question-container {
                padding: 1.5rem;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 3rem;
            }
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        .number-line {
            margin: 2rem auto;
            max-width: 100%;
            overflow-x: auto;
        }

        .helper-text {
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            color: #666;
            font-style: italic;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎮 Fraction Master</h1>
        <div class="student-name">Ameliia Kostromin's Learning Adventure</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="correctCount">0</div>
            <div class="stat-label">Correct ✓</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total Questions</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="streakCount">0</div>
            <div class="stat-label">🔥 Streak</div>
        </div>
    </div>

    <div class="question-container">
        <div class="question-type" id="questionType">Loading...</div>
        <div class="question-text" id="questionText"></div>
        <div class="visual-area" id="visualArea"></div>
        <div class="answer-section">
            <div id="answerInputArea"></div>
            <button class="button" id="submitBtn" onclick="checkAnswer()">Submit Answer</button>
        </div>
        <div id="feedbackArea"></div>
    </div>
</div>

<script>
    // Game State
    let currentQuestion = null;
    let stats = {
        correct: 0,
        total: 0,
        streak: 0,
        questionsAnswered: new Set()
    };

    // Question Types for 3rd Grade
    const questionTypes = [
        'identifyFraction',
        'visualFraction',
        'compareFractions',
        'equivalentFractions',
        'numberLine',
        'simplifyFraction',
        'addSameDenominator',
        'fractionOfGroup',
        'wholeAndParts'
    ];

    // Utility Functions
    function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
    }

    function simplifyFraction(num, den) {
        const divisor = gcd(num, den);
        return { numerator: num / divisor, denominator: den / divisor };
    }

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getRandomElement(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // Visual Drawing Functions
    function drawCircle(filled, total, index) {
        const size = 120;
        const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe'];
        const color = colors[index % colors.length];

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        svg.setAttribute("viewBox", `0 0 ${size} ${size}`);

        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2 - 10;

        // Draw circle segments
        for (let i = 0; i < total; i++) {
            const startAngle = (i * 360 / total - 90) * Math.PI / 180;
            const endAngle = ((i + 1) * 360 / total - 90) * Math.PI / 180;

            const x1 = centerX + radius * Math.cos(startAngle);
            const y1 = centerY + radius * Math.sin(startAngle);
            const x2 = centerX + radius * Math.cos(endAngle);
            const y2 = centerY + radius * Math.sin(endAngle);

            const largeArc = 360 / total > 180 ? 1 : 0;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
            path.setAttribute("d", d);
            path.setAttribute("fill", i < filled ? color : "#f0f0f0");
            path.setAttribute("stroke", "#2d3748");
            path.setAttribute("stroke-width", "2");
            svg.appendChild(path);
        }

        return svg;
    }

    function drawBar(filled, total) {
        const width = 300;
        const height = 80;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", height);
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

        const barWidth = width / total;

        for (let i = 0; i < total; i++) {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", i * barWidth);
            rect.setAttribute("y", 10);
            rect.setAttribute("width", barWidth - 4);
            rect.setAttribute("height", 60);
            rect.setAttribute("fill", i < filled ? "#667eea" : "#f0f0f0");
            rect.setAttribute("stroke", "#2d3748");
            rect.setAttribute("stroke-width", "2");
            rect.setAttribute("rx", "4");
            svg.appendChild(rect);
        }

        return svg;
    }

    function drawNumberLine(denominator, numerator = null) {
        const width = Math.min(600, window.innerWidth - 80);
        const height = 100;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", height);
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

        const lineY = 50;
        const padding = 40;
        const lineWidth = width - 2 * padding;

        // Main line
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", padding);
        line.setAttribute("y1", lineY);
        line.setAttribute("x2", width - padding);
        line.setAttribute("y2", lineY);
        line.setAttribute("stroke", "#2d3748");
        line.setAttribute("stroke-width", "3");
        svg.appendChild(line);

        // Tick marks and labels
        for (let i = 0; i <= denominator; i++) {
            const x = padding + (i / denominator) * lineWidth;

            const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
            tick.setAttribute("x1", x);
            tick.setAttribute("y1", lineY - 10);
            tick.setAttribute("x2", x);
            tick.setAttribute("y2", lineY + 10);
            tick.setAttribute("stroke", "#2d3748");
            tick.setAttribute("stroke-width", "2");
            svg.appendChild(tick);

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x);
            text.setAttribute("y", lineY + 30);
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("font-size", "14");
            text.setAttribute("font-weight", "600");
            text.textContent = i === 0 ? "0" : i === denominator ? "1" : `${i}/${denominator}`;
            svg.appendChild(text);
        }

        // Highlight specific fraction if provided
        if (numerator !== null) {
            const x = padding + (numerator / denominator) * lineWidth;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", lineY);
            circle.setAttribute("r", "8");
            circle.setAttribute("fill", "#f5576c");
            circle.setAttribute("stroke", "#2d3748");
            circle.setAttribute("stroke-width", "2");
            svg.appendChild(circle);
        }

        return svg;
    }

    // Question Generators
    function generateIdentifyFraction() {
        const denominator = randomInt(2, 8);
        const numerator = randomInt(1, denominator);

        return {
            type: 'identifyFraction',
            question: `Look at the visual below. What fraction is shaded?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'circle-container';
                container.appendChild(drawCircle(numerator, denominator, 0));
                return container;
            },
            answerType: 'fraction',
            correctAnswer: { numerator, denominator },
            explanation: `The circle is divided into ${denominator} equal parts (this number is called the <strong>denominator</strong>). ${numerator} ${numerator === 1 ? 'part is' : 'parts are'} shaded (this number is called the <strong>numerator</strong>). So the fraction is ${numerator}/${denominator}. The denominator tells us how many equal parts make up the whole, and the numerator tells us how many of those parts we have.`
        };
    }

    function generateVisualFraction() {
        const denominators = [2, 3, 4, 5, 6, 8];
        const denominator = getRandomElement(denominators);
        const numerator = randomInt(1, denominator - 1);

        const visualType = getRandomElement(['circle', 'bar']);

        return {
            type: 'visualFraction',
            question: `Shade ${numerator}/${denominator} of the shape in your mind. How many parts should be shaded?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'circle-container';
                if (visualType === 'circle') {
                    container.appendChild(drawCircle(0, denominator, 0));
                } else {
                    container.appendChild(drawBar(0, denominator));
                }
                const helper = document.createElement('div');
                helper.className = 'helper-text';
                helper.textContent = `The fraction is ${numerator}/${denominator}`;
                container.appendChild(helper);
                return container;
            },
            answerType: 'number',
            correctAnswer: numerator,
            explanation: `In the fraction ${numerator}/${denominator}, the denominator (${denominator}) tells us the total number of equal parts. The numerator (${numerator}) tells us how many parts to shade. So we need to shade ${numerator} ${numerator === 1 ? 'part' : 'parts'} out of ${denominator} total parts.`
        };
    }

    function generateCompareFractions() {
        const denominator = randomInt(3, 8);
        const num1 = randomInt(1, denominator - 1);
        let num2 = randomInt(1, denominator - 1);
        while (num2 === num1) {
            num2 = randomInt(1, denominator - 1);
        }

        const symbol = num1 > num2 ? '>' : '<';

        return {
            type: 'compareFractions',
            question: `Compare these fractions: ${num1}/${denominator} ___ ${num2}/${denominator}<br><br>Type either > (greater than) or < (less than)`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'circle-container';

                const label1 = document.createElement('div');
                label1.style.textAlign = 'center';
                label1.innerHTML = `<strong>${num1}/${denominator}</strong>`;
                container.appendChild(label1);
                container.appendChild(drawCircle(num1, denominator, 0));

                const spacer = document.createElement('div');
                spacer.style.width = '20px';
                container.appendChild(spacer);

                const label2 = document.createElement('div');
                label2.style.textAlign = 'center';
                label2.innerHTML = `<strong>${num2}/${denominator}</strong>`;
                container.appendChild(label2);
                container.appendChild(drawCircle(num2, denominator, 1));

                return container;
            },
            answerType: 'comparison',
            correctAnswer: symbol,
            explanation: `When fractions have the same denominator (bottom number), we compare the numerators (top numbers). ${num1}/${denominator} has ${num1} shaded parts, and ${num2}/${denominator} has ${num2} shaded parts. Since ${num1} ${symbol} ${num2}, we write: ${num1}/${denominator} ${symbol} ${num2}/${denominator}. The bigger the numerator, the bigger the fraction when denominators are the same!`
        };
    }

    function generateEquivalentFractions() {
        const baseDen = randomInt(2, 4);
        const baseNum = randomInt(1, baseDen - 1);
        const multiplier = randomInt(2, 3);

        const newNum = baseNum * multiplier;
        const newDen = baseDen * multiplier;

        const askFor = getRandomElement(['numerator', 'denominator']);

        if (askFor === 'numerator') {
            return {
                type: 'equivalentFractions',
                question: `Fill in the blank to make equivalent fractions:<br><br>${baseNum}/${baseDen} = ?/${newDen}`,
                visual: () => {
                    const container = document.createElement('div');
                    container.className = 'circle-container';

                    const div1 = document.createElement('div');
                    div1.style.textAlign = 'center';
                    div1.innerHTML = `<strong>${baseNum}/${baseDen}</strong>`;
                    container.appendChild(div1);
                    container.appendChild(drawCircle(baseNum, baseDen, 0));

                    const equals = document.createElement('div');
                    equals.style.fontSize = '2rem';
                    equals.style.padding = '0 1rem';
                    equals.textContent = '=';
                    container.appendChild(equals);

                    const div2 = document.createElement('div');
                    div2.style.textAlign = 'center';
                    div2.innerHTML = `<strong>?/${newDen}</strong>`;
                    container.appendChild(div2);
                    container.appendChild(drawCircle(newNum, newDen, 1));

                    return container;
                },
                answerType: 'number',
                correctAnswer: newNum,
                explanation: `Equivalent fractions represent the same amount but with different numbers. To go from ${baseDen} to ${newDen}, we multiply by ${multiplier} (because ${baseDen} × ${multiplier} = ${newDen}). We must do the same to the numerator: ${baseNum} × ${multiplier} = ${newNum}. So ${baseNum}/${baseDen} = ${newNum}/${newDen}. They're equivalent - they show the same amount!`
            };
        } else {
            return {
                type: 'equivalentFractions',
                question: `Fill in the blank to make equivalent fractions:<br><br>${baseNum}/${baseDen} = ${newNum}/?`,
                visual: () => {
                    const container = document.createElement('div');
                    container.className = 'circle-container';

                    const div1 = document.createElement('div');
                    div1.style.textAlign = 'center';
                    div1.innerHTML = `<strong>${baseNum}/${baseDen}</strong>`;
                    container.appendChild(div1);
                    container.appendChild(drawCircle(baseNum, baseDen, 0));

                    const equals = document.createElement('div');
                    equals.style.fontSize = '2rem';
                    equals.style.padding = '0 1rem';
                    equals.textContent = '=';
                    container.appendChild(equals);

                    const div2 = document.createElement('div');
                    div2.style.textAlign = 'center';
                    div2.innerHTML = `<strong>${newNum}/?</strong>`;
                    container.appendChild(div2);
                    container.appendChild(drawCircle(newNum, newDen, 1));

                    return container;
                },
                answerType: 'number',
                correctAnswer: newDen,
                explanation: `To go from ${baseNum} to ${newNum}, we multiply by ${multiplier} (because ${baseNum} × ${multiplier} = ${newNum}). We must do the same to the denominator: ${baseDen} × ${multiplier} = ${newDen}. So ${baseNum}/${baseDen} = ${newNum}/${newDen}. These fractions are equivalent!`
            };
        }
    }

    function generateNumberLine() {
        const denominator = randomInt(2, 6);
        const numerator = randomInt(1, denominator);

        return {
            type: 'numberLine',
            question: `Look at the number line divided into ${denominator} equal parts. What fraction is marked by the red dot?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'number-line';
                container.appendChild(drawNumberLine(denominator, numerator));
                return container;
            },
            answerType: 'fraction',
            correctAnswer: { numerator, denominator },
            explanation: `The number line goes from 0 to 1 and is divided into ${denominator} equal parts. Each part represents 1/${denominator}. The red dot is at position ${numerator}, which means we count ${numerator} ${numerator === 1 ? 'part' : 'parts'} from 0. So the fraction is ${numerator}/${denominator}. Number lines help us see fractions as numbers with specific positions!`
        };
    }

    function generateSimplifyFraction() {
        const multiplier = randomInt(2, 3);
        const baseNum = randomInt(1, 3);
        const baseDen = randomInt(baseNum + 1, 4);

        const num = baseNum * multiplier;
        const den = baseDen * multiplier;

        return {
            type: 'simplifyFraction',
            question: `Simplify this fraction to its simplest form (also called "lowest terms"):<br><br>${num}/${den} = ?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'helper-text';
                container.textContent = 'Hint: Find a number that divides evenly into both the numerator and denominator';
                return container;
            },
            answerType: 'fraction',
            correctAnswer: { numerator: baseNum, denominator: baseDen },
            explanation: `To simplify ${num}/${den}, we need to find the greatest common factor (the biggest number that divides evenly into both numbers). Both ${num} and ${den} can be divided by ${multiplier}. When we divide: ${num} ÷ ${multiplier} = ${baseNum} and ${den} ÷ ${multiplier} = ${baseDen}. So ${num}/${den} = ${baseNum}/${baseDen} in simplest form. A fraction is in simplest form when the only number that divides evenly into both the numerator and denominator is 1.`
        };
    }

    function generateAddSameDenominator() {
        const denominator = randomInt(4, 8);
        const num1 = randomInt(1, denominator - 2);
        const num2 = randomInt(1, denominator - num1);
        const sum = num1 + num2;

        return {
            type: 'addSameDenominator',
            question: `Add these fractions:<br><br>${num1}/${denominator} + ${num2}/${denominator} = ?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'circle-container';

                const div1 = document.createElement('div');
                div1.style.textAlign = 'center';
                div1.innerHTML = `<strong>${num1}/${denominator}</strong>`;
                container.appendChild(div1);
                container.appendChild(drawBar(num1, denominator));

                const plus = document.createElement('div');
                plus.style.fontSize = '1.5rem';
                plus.style.padding = '1rem';
                plus.textContent = '+';
                container.appendChild(plus);

                const div2 = document.createElement('div');
                div2.style.textAlign = 'center';
                div2.innerHTML = `<strong>${num2}/${denominator}</strong>`;
                container.appendChild(div2);
                container.appendChild(drawBar(num2, denominator));

                return container;
            },
            answerType: 'fraction',
            correctAnswer: { numerator: sum, denominator },
            explanation: `When adding fractions with the same denominator, we keep the denominator the same and add the numerators. Think of it like this: ${num1} pieces plus ${num2} pieces equals ${sum} pieces. But each piece is still one-${denominator}th of the whole. So ${num1}/${denominator} + ${num2}/${denominator} = ${sum}/${denominator}. The denominator stays the same because the size of each piece doesn't change!`
        };
    }

    function generateFractionOfGroup() {
        const denominators = [2, 3, 4];
        const denominator = getRandomElement(denominators);
        const totalObjects = denominator * randomInt(2, 4);
        const numerator = randomInt(1, denominator - 1);
        const answer = (numerator * totalObjects) / denominator;

        const objects = ['apples🍎', 'stars⭐', 'hearts❤️', 'cookies🍪'];
        const object = getRandomElement(objects);

        return {
            type: 'fractionOfGroup',
            question: `You have ${totalObjects} ${object}. If you take ${numerator}/${denominator} of them, how many do you take?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'helper-text';
                container.style.fontSize = '2rem';
                container.style.marginBottom = '1rem';
                container.textContent = object.slice(-2).repeat(totalObjects);
                return container;
            },
            answerType: 'number',
            correctAnswer: answer,
            explanation: `To find ${numerator}/${denominator} of ${totalObjects}, we divide ${totalObjects} into ${denominator} equal groups. ${totalObjects} ÷ ${denominator} = ${totalObjects/denominator}, so each group has ${totalObjects/denominator}. We want ${numerator} ${numerator === 1 ? 'group' : 'groups'}, so we multiply: ${numerator} × ${totalObjects/denominator} = ${answer}. Finding a fraction of a group means dividing the group into equal parts and taking some of those parts!`
        };
    }

    function generateWholeAndParts() {
        const denominator = randomInt(2, 6);
        const wholes = randomInt(1, 2);
        const numerator = randomInt(1, denominator - 1);

        const totalParts = wholes * denominator + numerator;

        return {
            type: 'wholeAndParts',
            question: `Look at the circles below. Write this as a fraction (improper fraction is fine).<br><br>How many ${denominator}ths do you see in total?`,
            visual: () => {
                const container = document.createElement('div');
                container.className = 'circle-container';

                for (let i = 0; i < wholes; i++) {
                    container.appendChild(drawCircle(denominator, denominator, i));
                }
                container.appendChild(drawCircle(numerator, denominator, wholes));

                return container;
            },
            answerType: 'fraction',
            correctAnswer: { numerator: totalParts, denominator },
            explanation: `We have ${wholes} complete ${wholes === 1 ? 'circle' : 'circles'} plus ${numerator}/${denominator} of another circle. Each whole circle equals ${denominator}/${denominator}. So ${wholes} ${wholes === 1 ? 'whole' : 'wholes'} = ${wholes * denominator}/${denominator}. Adding the extra ${numerator}/${denominator}: ${wholes * denominator}/${denominator} + ${numerator}/${denominator} = ${totalParts}/${denominator}. This is called an improper fraction because the numerator is bigger than the denominator - that's okay! It just means we have more than one whole.`
        };
    }

    // Generate Question
    function generateQuestion() {
        const type = getRandomElement(questionTypes);

        switch(type) {
            case 'identifyFraction': return generateIdentifyFraction();
            case 'visualFraction': return generateVisualFraction();
            case 'compareFractions': return generateCompareFractions();
            case 'equivalentFractions': return generateEquivalentFractions();
            case 'numberLine': return generateNumberLine();
            case 'simplifyFraction': return generateSimplifyFraction();
            case 'addSameDenominator': return generateAddSameDenominator();
            case 'fractionOfGroup': return generateFractionOfGroup();
            case 'wholeAndParts': return generateWholeAndParts();
        }
    }

    // Display Question
    function displayQuestion() {
        currentQuestion = generateQuestion();

        const typeNames = {
            'identifyFraction': '📊 Identify the Fraction',
            'visualFraction': '🎨 Visual Fractions',
            'compareFractions': '⚖️ Compare Fractions',
            'equivalentFractions': '🔄 Equivalent Fractions',
            'numberLine': '📏 Number Line',
            'simplifyFraction': '✨ Simplify Fractions',
            'addSameDenominator': '➕ Add Fractions',
            'fractionOfGroup': '🎯 Fraction of a Group',
            'wholeAndParts': '🔢 Wholes and Parts'
        };

        document.getElementById('questionType').textContent = typeNames[currentQuestion.type];
        document.getElementById('questionText').innerHTML = currentQuestion.question;

        const visualArea = document.getElementById('visualArea');
        visualArea.innerHTML = '';
        if (currentQuestion.visual) {
            visualArea.appendChild(currentQuestion.visual());
        }

        const answerInputArea = document.getElementById('answerInputArea');
        answerInputArea.innerHTML = '';

        if (currentQuestion.answerType === 'fraction') {
            const group = document.createElement('div');
            group.className = 'fraction-input-group';
            group.innerHTML = `
                    <input type="number" id="numerator" class="answer-input" placeholder="?" min="0">
                    <div class="fraction-line"></div>
                    <input type="number" id="denominator" class="answer-input" placeholder="?" min="1">
                `;
            answerInputArea.appendChild(group);

            document.getElementById('numerator').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('denominator').focus();
                }
            });

            document.getElementById('denominator').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });

            setTimeout(() => document.getElementById('numerator').focus(), 100);
        } else if (currentQuestion.answerType === 'comparison') {
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'answer';
            input.className = 'answer-input';
            input.placeholder = '< or >';
            input.maxLength = 1;
            answerInputArea.appendChild(input);

            const helper = document.createElement('div');
            helper.className = 'helper-text';
            helper.textContent = 'Type < (less than) or > (greater than)';
            answerInputArea.appendChild(helper);

            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });

            setTimeout(() => input.focus(), 100);
        } else {
            const input = document.createElement('input');
            input.type = 'number';
            input.id = 'answer';
            input.className = 'answer-input';
            input.placeholder = '?';
            input.min = '0';
            answerInputArea.appendChild(input);

            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });

            setTimeout(() => input.focus(), 100);
        }

        document.getElementById('feedbackArea').innerHTML = '';
        document.getElementById('submitBtn').style.display = 'block';
    }

    // Check Answer
    function checkAnswer() {
        let userAnswer;
        let isCorrect = false;

        if (currentQuestion.answerType === 'fraction') {
            const num = parseInt(document.getElementById('numerator').value);
            const den = parseInt(document.getElementById('denominator').value);

            if (isNaN(num) || isNaN(den) || den === 0) {
                alert('Please enter valid numbers for both numerator and denominator!');
                return;
            }

            userAnswer = { numerator: num, denominator: den };

            // Check if equivalent
            const userSimplified = simplifyFraction(num, den);
            const correctSimplified = simplifyFraction(
                currentQuestion.correctAnswer.numerator,
                currentQuestion.correctAnswer.denominator
            );

            isCorrect = userSimplified.numerator === correctSimplified.numerator &&
                userSimplified.denominator === correctSimplified.denominator;
        } else if (currentQuestion.answerType === 'comparison') {
            userAnswer = document.getElementById('answer').value.trim();
            isCorrect = userAnswer === currentQuestion.correctAnswer;
        } else {
            userAnswer = parseFloat(document.getElementById('answer').value);
            if (isNaN(userAnswer)) {
                alert('Please enter a valid number!');
                return;
            }
            isCorrect = userAnswer === currentQuestion.correctAnswer;
        }

        stats.total++;

        const feedbackArea = document.getElementById('feedbackArea');
        feedbackArea.innerHTML = '';

        const feedback = document.createElement('div');
        feedback.className = 'feedback';

        if (isCorrect) {
            stats.correct++;
            stats.streak++;
            feedback.classList.add('correct');

            const celebration = document.createElement('div');
            celebration.className = 'celebration';
            const emojis = ['🎉', '⭐', '🌟', '✨', '🎊', '👏', '🏆'];
            celebration.textContent = getRandomElement(emojis);
            feedback.appendChild(celebration);

            const messages = [
                'Excellent work, Ameliia!',
                'You got it right!',
                'Perfect! Keep it up!',
                'Amazing job!',
                'You\'re a fraction master!',
                'Brilliant!',
                'Fantastic!',
                'You\'re on fire! 🔥'
            ];

            const message = document.createElement('div');
            message.innerHTML = `<strong>${getRandomElement(messages)}</strong>`;
            feedback.appendChild(message);

            if (stats.streak >= 3) {
                const streakMsg = document.createElement('div');
                streakMsg.style.marginTop = '0.5rem';
                streakMsg.innerHTML = `🔥 Amazing! ${stats.streak} correct in a row!`;
                feedback.appendChild(streakMsg);
            }
        } else {
            stats.streak = 0;
            feedback.classList.add('incorrect');

            const message = document.createElement('div');
            message.innerHTML = `<strong>Not quite right, but that's okay! Let's learn from this.</strong>`;
            feedback.appendChild(message);

            const explanation = document.createElement('div');
            explanation.className = 'explanation';
            explanation.innerHTML = `
                    <div class="explanation-title">💡 Here's why:</div>
                    ${currentQuestion.explanation}
                `;
            feedback.appendChild(explanation);
        }

        feedbackArea.appendChild(feedback);

        const nextBtn = document.createElement('button');
        nextBtn.className = 'button next-button';
        nextBtn.textContent = 'Next Question →';
        nextBtn.onclick = displayQuestion;
        feedbackArea.appendChild(nextBtn);

        document.getElementById('submitBtn').style.display = 'none';

        updateStats();
    }

    // Update Stats
    function updateStats() {
        document.getElementById('correctCount').textContent = stats.correct;
        document.getElementById('totalCount').textContent = stats.total;
        document.getElementById('streakCount').textContent = stats.streak;

        const percentage = stats.total > 0 ? (stats.correct / stats.total * 100) : 0;
        document.getElementById('progressFill').style.width = percentage + '%';
    }

    // Initialize
    window.onload = function() {
        displayQuestion();
    };
</script>
</body>

<script>
    // Game State
    let currentLevel = 1;
    let score = 0;
    let streak = 0;
    let correctAnswers = 0;
    let currentQuestion = null;

    // Utility Functions
    function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
    }

    function simplifyFraction(num, den) {
        const divisor = gcd(num, den);
        return [num / divisor, den / divisor];
    }

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Level Selection
    function selectLevel(level) {
        currentLevel = level;

        const numerator = randomInt(1, denominator - 1);

        currentQuestion = {
            type: 'visual',
            numerator: numerator,
            denominator: denominator,
            answer: `${numerator}/${denominator}`
        };

        let html = '<p class="question-text">What fraction is shaded?</p>';
        html += '<div class="visual-aid">';
        html += '<div class="circles-container">';

        for (let i = 0; i < denominator; i++) {
            html += '<div class="circle">';

            }
            html += '</div>';
        }

        html += '</div></div>';

        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('visualAid').classList.add('hidden');

                <div class="fraction-input-container">

                <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
            `;
    }

    function generateLevel2() {
        // Comparing fractions
        const den1 = [2, 3, 4, 6, 8][randomInt(0, 4)];
        const num1 = randomInt(1, den1 - 1);
        const den2 = [2, 3, 4, 6, 8][randomInt(0, 4)];
        const num2 = randomInt(1, den2 - 1);

        const val1 = num1 / den1;
        const val2 = num2 / den2;
        let correctAnswer;

        if (val1 > val2) correctAnswer = '>';
        else if (val1 < val2) correctAnswer = '<';
        else correctAnswer = '=';

        currentQuestion = {
            type: 'compare',
            num1, den1, num2, den2,
            answer: correctAnswer
        };

        let html = '<p class="question-text">Which fraction is greater?</p>';
        html += '<div style="display: flex; justify-content: center; align-items: center; gap: 2rem; flex-wrap: wrap; margin: 2rem 0;">';
        html += `<div class="fraction-display">
                <span class="numerator">${num1}</span>
                <div class="fraction-line"></div>
                <span class="denominator">${den1}</span>

    function generateLevel3() {

        const denominator = [2, 3, 4, 5, 6, 8][randomInt(0, 5)];
        const num1 = randomInt(1, denominator - 2);
        const num2 = randomInt(1, denominator - num1);

        const sumNum = num1 + num2;
        const [simplifiedNum, simplifiedDen] = simplifyFraction(sumNum, denominator);

        currentQuestion = {
            type: 'add',
            num1, num2, denominator,
            answerNum: simplifiedNum,
            answerDen: simplifiedDen,
            beforeSimplify: [sumNum, denominator]
        };

        let html = '<p class="question-text">Add these fractions and simplify your answer:</p>';

    function generateLevel4() {
        // Equivalent fractions
        const originalDen = [2, 3, 4, 5, 6][randomInt(0, 4)];
        const originalNum = randomInt(1, originalDen - 1);
        const multiplier = randomInt(2, 4);

        const targetDen = originalDen * multiplier;
        const targetNum = originalNum * multiplier;

        currentQuestion = {
            type: 'equivalent',
            originalNum, originalDen,
            targetNum, targetDen,
            answer: targetNum
        };

        let html = '<p class="question-text">Find the equivalent fraction:</p>';
        html += '<div style="display: flex; justify-content: center; align-items: center; gap: 1.5rem; flex-wrap: wrap; margin: 2rem 0;">';

                visualHtml += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';

        }
        visualHtml += '</div></div>';

        visualHtml += '<div style="text-align: center;">';

        visualHtml += '<div class="circles-container" style="justify-content: center;">';
        for (let i = 0; i < targetDen; i++) {
            visualHtml += '<div class="circle" style="width: 60px; height: 60px;">';
            if (i < targetNum) {
                visualHtml += '<div class="circle-fill" style="width: 100%; height: 100%;"></div>';

            visualHtml += '</div>';

        visualHtml += '</div></div>';

        visualHtml += '</div>';
        visualHtml += `<p style="text-align: center; margin-top: 1rem; font-style: italic;">Hint: The denominators are different, but they represent the same amount!</p>`;

                <p style="text-align: center; margin: 1rem 0; font-weight: 600;">What number goes in the numerator?</p>
                <input type="number" id="numeratorInput" class="answer-input" placeholder="?" min="0">
                <button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>
            `;
    }

    function generateQuestion() {
        document.getElementById('feedback').classList.add('hidden');

        switch(currentLevel) {
            case 1: generateLevel1(); break;
            case 2: generateLevel2(); break;
            case 3: generateLevel3(); break;
            case 4: generateLevel4(); break;

        // Add enter key support
        setTimeout(() => {

            inputs.forEach(input => {

                    if (e.key === 'Enter') checkAnswer();

            case 'compare':

                const val2 = currentQuestion.num2 / currentQuestion.den2;

                                <p><strong>${currentQuestion.num2}/${currentQuestion.den2}</strong> means ${currentQuestion.num2} out of ${currentQuestion.den2} parts</p>

                                <p>So ${currentQuestion.num1}/${currentQuestion.den1} ${currentQuestion.answer} ${currentQuestion.num2}/${currentQuestion.den2}</p>

                break;

            case 'add':
                const addUserNum = parseInt(document.getElementById('numeratorInput').value);
                const addUserDen = parseInt(document.getElementById('denominatorInput').value);
                correct = addUserNum === currentQuestion.answerNum && addUserDen === currentQuestion.answerDen;

                if (correct) {

                                <p><strong>Step 1:</strong> Add only the numerators (top numbers): ${currentQuestion.num1} + ${currentQuestion.num2} = ${currentQuestion.beforeSimplify[0]}</p>
                                <p><strong>Step 2:</strong> Keep the denominator the same: ${currentQuestion.denominator}</p>
                                <p><strong>Step 3:</strong> This gives us ${currentQuestion.beforeSimplify[0]}/${currentQuestion.beforeSimplify[1]}</p>
                                ${currentQuestion.beforeSimplify[0] !== currentQuestion.answerNum ?
                        `<p><strong>Step 4:</strong> Simplify! Both ${currentQuestion.beforeSimplify[0]} and ${currentQuestion.beforeSimplify[1]} can be divided by ${currentQuestion.beforeSimplify[0]/currentQuestion.answerNum}</p>
